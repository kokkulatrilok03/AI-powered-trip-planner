services:
  - type: web
    name: trao-travel-api
    runtime: node
    plan: free
    buildCommand: npm install --include=dev && npm run build --workspace=backend
    startCommand: npm run start --workspace=backend
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: GEMINI_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
